# version: "3.9"

networks:
  public:
    name: voip_public
    driver: bridge
  internal:
    name: voip_internal
    driver: bridge
  monitoring:
    name: voip_monitoring
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  traefik_letsencrypt:

services:
  postgres:
    image: postgres:16-alpine
    container_name: voip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voip_password}
      POSTGRES_DB: ${POSTGRES_DB:-voip_cloud_pbx}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: voip-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal

  nats:
    image: nats:2.10-alpine
    container_name: voip-nats
    restart: unless-stopped
    command: ["-js"]
    healthcheck:
      test: ["CMD", "nats", "server", "report"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - internal

  traefik:
    image: traefik:v3.1
    container_name: voip-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--metrics.prometheus=true"
      - "--accesslog=true"
    ports:
      - "8081:80" # changed from 80:80
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
      - ./infrastructure/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - public
      - internal
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/rawdata"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST:-traefik.localhost}`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: voip-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    container_name: voip-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "http://localhost:3002"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3002:3000"
    networks:
      - monitoring
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway-stub:
    image: traefik/whoami:v1.10.0
    container_name: voip-api-gateway-stub
    restart: unless-stopped
    networks:
      - internal
      - public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.middlewares=cors-global,compression-global,ratelimit-api"
      - "traefik.http.services.api.loadbalancer.server.port=80"

  dashboard-web:
    build:
      context: ./apps/dashboard-web
      dockerfile: Dockerfile
    container_name: voip-dashboard-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - internal
      - public
    depends_on:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.localhost`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.routers.app.middlewares=compression-global"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: voip-auth-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: "8081"
      AUTH_SERVICE_PORT: "8081"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-voip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voip_password}
      POSTGRES_DB: ${POSTGRES_DB:-voip_cloud_pbx}
    depends_on:
      - postgres
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`api.localhost`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.routers.auth.middlewares=cors-global,compression-global,ratelimit-api"
      - "traefik.http.services.auth.loadbalancer.server.port=8081"
